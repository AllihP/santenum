name: Django CI/CD Pipeline

on:
  push:
    branches:
      - master # Ou main, selon votre branche principale
  pull_request:
    branches:
      - master # Ou main, pour exécuter les tests sur les PRs

jobs:
  build_and_test:
    runs-on: ubuntu-latest # Environnement d'exécution

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Assurez-vous que c'est la même version que celle utilisée sur Render

      - name: Set up Poetry
        run: pip install poetry==2.1.3 # Assurez-vous que c'est la même version que celle utilisée sur Render

      - name: Cache Poetry dependencies
        id: cache-poetry
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies with Poetry
        run: poetry install --no-root # --no-root si votre projet n'est pas une librairie Python installable

      - name: Create .env file for tests (if needed)
        run: |
          echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> .env
          echo "DJANGO_DEBUG=True" >> .env # Debug True for local tests
          # Ajoutez d'autres variables d'environnement nécessaires pour les tests si non-définies dans Django settings
        # On this step, we're creating a .env file only for the CI environment for testing.
        # This .env file should NOT be committed to your repository.

      - name: Run Django Tests
        run: python manage.py test # Exécute tous les tests Django

      - name: Configure Docker Buildx (Optional, but recommended for better Docker builds)
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub (if pushing images)
        if: github.ref == 'refs/heads/master' # Exécuter uniquement sur la branche principale
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/master' # Exécuter uniquement sur la branche principale
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true # Pousse l'image vers le registre (Docker Hub dans cet exemple)
          tags: your-dockerhub-username/your-repo-name:latest # Remplacez par votre nom d'utilisateur Docker Hub et nom de dépôt
          cache-from: type=gha # Utilise le cache de GitHub Actions pour les couches Docker
          cache-to: type=gha,mode=max

  deploy:
    needs: build_and_test # Cette tâche dépend du succès de la tâche 'build_and_test'
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' # Déployer uniquement lorsque la branche principale est mise à jour

    steps:
      - name: Trigger Render Deploy Hook (Recommended for Render)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set. Skipping Render deployment trigger."
            exit 0
          fi
          echo "Triggering Render deployment..."
          curl "$RENDER_DEPLOY_HOOK_URL" -X POST
          echo "Render deployment triggered successfully."
